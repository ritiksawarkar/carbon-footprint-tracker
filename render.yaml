services:
  - type: web
    runtime: node
    name: ecotrack-api
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    healthCheckPath: /health/live
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        sync: false

  - type: web
    runtime: static
    name: ecotrack-web
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
